services:
  app:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
      - postgres
    volumes:
      - ./src:/app/src
      - results:/tmp/vto-results

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: vto
      POSTGRES_PASSWORD: vto
      POSTGRES_DB: vto
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  results:
